version: 2
models:
- name: week3_extractions
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - stream_id
      - payload.package_id
      - payload.document_id
  - dbt_utils.expression_is_true:
      expression: payload_processing_ms > 0
  - dbt_utils.expression_is_true:
      expression: payload_raw_text_length > 0
  - dbt_utils.expression_is_true:
      expression: payload_tables_extracted >= 1
  - dbt_utils.expression_is_true:
      expression: payload_facts_current_assets >= payload_facts_cash_and_equivalents
  - dbt_utils.expression_is_true:
      expression: payload_facts_field_confidence_total_revenue between 0 and 1
  - dbt_utils.expression_is_true:
      expression: payload_facts_field_confidence_net_income between 0 and 1
  - dbt_utils.expression_is_true:
      expression: payload_facts_field_confidence_total_assets between 0 and 1
  columns:
  - name: __source_line
    description: Inferred integer field from week3_extractions
    tests:
    - not_null
  - name: event_type
    description: Inferred string field from week3_extractions
    tests:
    - not_null
    - accepted_values:
        values:
        - ExtractionCompleted
  - name: event_version
    description: Inferred integer field from week3_extractions
    tests:
    - not_null
  - name: payload.completed_at
    description: Inferred string field from week3_extractions
    tests:
    - not_null
  - name: payload.document_id
    description: Inferred string field from week3_extractions
    tests:
    - not_null
  - name: payload.document_type
    description: Inferred string field from week3_extractions
    tests:
    - not_null
    - accepted_values:
        values:
        - income_statement
        - balance_sheet
  - name: payload.facts.accounts_receivable
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.balance_discrepancy_usd
    description: Inferred string field from week3_extractions
    tests: []
  - name: payload.facts.balance_sheet_balances
    description: Inferred boolean field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.cash_and_equivalents
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.currency
    description: Inferred string field from week3_extractions
    tests:
    - not_null
    - accepted_values:
        values:
        - USD
  - name: payload.facts.current_assets
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.current_liabilities
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.current_ratio
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.debt_to_ebitda
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.debt_to_equity
    description: Inferred number field from week3_extractions
    tests:
    - not_null
  - name: payload.facts.depreciation_amortization
